services:
  # 1. Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/alerts:/etc/prometheus/alerts
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d  # 기본값 무제한, 14일로 제한
      - --web.enable-lifecycle
      - --web.enable-admin-api
    restart: always
    networks:
      - monitoring

  # 2. Pushgateway (단기/배치 작업 메트릭 수집)
  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    command:
      # 메모리만 사용(기본), 디스크 미사용으로 I/O 최소화
      - --persistence.file=
    restart: always
    networks:
      - monitoring

  # 2-0. Pushgateway cleaner (60초 미갱신 메트릭 그룹 자동 삭제)
  pushgateway-cleaner:
    build: ./pushgateway-cleaner
    container_name: pushgateway-cleaner
    environment:
      - PUSHGATEWAY_HOST=pushgateway
      - PUSHGATEWAY_PORT=9091
      - STALE_SECONDS=60
      - CHECK_INTERVAL=20
    restart: always
    depends_on:
      - pushgateway
    networks:
      - monitoring

  # 2-1. Pushgateway 프록시 (PUT 요청을 POST로 변환하여 전달)
  pushgateway-proxy:
    build: ./pushgateway-proxy
    container_name: pushgateway-proxy
    ports:
      - "9091:9091"
    environment:
      - PUSHGATEWAY_HOST=pushgateway
      - PUSHGATEWAY_PORT=9091
    restart: always
    networks:
      - monitoring

  # 3. Alertmanager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    restart: always
    networks:
      - monitoring

  # 3-1. Dooray 웹훅 어댑터 (Alertmanager → Dooray 채널)
  dooray-webhook-adapter:
    build: ./dooray-webhook-adapter
    container_name: dooray-webhook-adapter
    ports:
      - "9095:9095"
    env_file:
      - .env
    environment:
      # Dooray 메신저 인커밍 웹훅 URL (채널별로 발급)
      # 기본 URL (같은 채널 사용 시 이 값만 설정하면 됨)
      - DOORAY_HOOK_URL=${DOORAY_HOOK_URL:-}
      # 위험( critical ) 알림을 보낼 채널 웹훅 URL (없으면 DOORAY_HOOK_URL 사용)
      - DOORAY_HOOK_URL_CRITICAL=${DOORAY_HOOK_URL_CRITICAL:-}
      # 중요( warning ) 알림을 보낼 채널 웹훅 URL (없으면 DOORAY_HOOK_URL 사용)
      - DOORAY_HOOK_URL_WARNING=${DOORAY_HOOK_URL_WARNING:-}
    restart: always
    networks:
      - monitoring

  # 4. Loki (최신 스키마 v13 및 TSDB 적용)
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    configs:
      - source: loki_config
        target: /etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: always
    networks:
      - monitoring

  # 5. Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # 알림/이메일 등에 들어가는 대시보드 링크의 베이스 URL (localhost 대신 사용할 주소)
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://133.186.251.230:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    restart: always
    networks:
      - monitoring

  # 6. Promtail
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log
    configs:
      - source: promtail_config
        target: /etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: always
    networks:
      - monitoring

  # 7. NHN Cloud Exporter (LB, CDN, RDS 메트릭)
  nhn-cloud-exporter:
    build: ./custom-exporters
    container_name: nhn-cloud-exporter
    ports:
      - "9101:9101"
    env_file:
      - .env
    environment:
      - EXPORTER_PORT=9101
      - SCRAPE_INTERVAL=60
      - LOG_LEVEL=WARNING
      - LOG_RETENTION_DAYS=7
      # 파일 로그 7일 보관(선택): LOG_DIR=/app/logs + volumes에 ./logs:/app/logs
      # NHN Cloud 인증 (필요 시 .env에 설정)
      - NHN_TENANT_ID=${NHN_TENANT_ID:-}
      - NHN_USERNAME=${NHN_USERNAME:-}
      - NHN_PASSWORD=${NHN_PASSWORD:-}
      - NHN_NETWORK_ENDPOINT=${NHN_NETWORK_ENDPOINT:-}
      - NHN_LB_OAUTH2_KEY=${NHN_LB_OAUTH2_KEY:-}
      - NHN_LB_OAUTH2_SECRET=${NHN_LB_OAUTH2_SECRET:-}
      - NHN_CDN_APPKEY=${NHN_CDN_APPKEY:-}
      - NHN_CDN_SECRETKEY=${NHN_CDN_SECRETKEY:-}
      - NHN_RDS_APPKEY=${NHN_RDS_APPKEY:-}
      - NHN_RDS_SECRETKEY=${NHN_RDS_SECRETKEY:-}
    restart: always
    # 디스크 부족 시 /tmp runc 임시파일 축적 완화: 주기 완화 + 가벼운 TCP 체크
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',9101), timeout=3); s.close()"]
      interval: 90s
      timeout: 5s
      retries: 2
      start_period: 15s
    networks:
      - monitoring

configs:
  loki_config:
    content: |
      auth_enabled: false
      server:
        http_listen_port: 3100
      common:
        instance_addr: 127.0.0.1
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory
      query_range:
        results_cache:
          cache:
            embedded_cache:
              enabled: true
              max_size_mb: 100
      schema_config:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        allow_structured_metadata: true
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        retention_period: 168h  # 7일 보관
      compactor:
        working_directory: /loki/compactor
        retention_enabled: true
        retention_delete_delay: 2h

  promtail_config:
    content: |
      server:
        http_listen_port: 9080
        grpc_listen_port: 0
      positions:
        filename: /tmp/positions.yaml
      clients:
        - url: http://loki:3100/loki/api/v1/push
      scrape_configs:
        - job_name: system
          static_configs:
            - targets:
                - localhost
              labels:
                job: varlogs
                __path__: /var/log/*log

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:
